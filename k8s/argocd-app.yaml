apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trust-sense
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yourusername/trust-sense-fixed
    targetRevision: main
    path: k8s
    plugin:
      name: auto
  destination:
    server: https://kubernetes.default.svc
    namespace: trust-sense
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10
