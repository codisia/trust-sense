apiVersion: v1
kind: Namespace
metadata:
  name: trust-sense
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: trust-sense
data:
  DATABASE_URL: "postgresql://user:password@postgres-db:5432/trust_sense"
  CORS_ORIGINS: "*"
  JWT_SECRET: "${JWT_SECRET}"
  SUPABASE_URL: "${SUPABASE_URL}"
  SUPABASE_KEY: "${SUPABASE_KEY}"
  GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
  GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
  GOOGLE_REDIRECT_URI: "${GOOGLE_REDIRECT_URI}"
  POWERBI_API_URL: "https://api.powerbi.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trust-sense-backend
  namespace: trust-sense
  labels:
    app: trust-sense-backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: trust-sense-backend
  template:
    metadata:
      labels:
        app: trust-sense-backend
    spec:
      containers:
      - name: backend
        image: gcr.io/trust-sense/trust-sense-backend:main
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: backend-config
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: trust-sense-backend-svc
  namespace: trust-sense
spec:
  selector:
    app: trust-sense-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trust-sense-frontend
  namespace: trust-sense
  labels:
    app: trust-sense-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: trust-sense-frontend
  template:
    metadata:
      labels:
        app: trust-sense-frontend
    spec:
      containers:
      - name: frontend
        image: gcr.io/trust-sense/trust-sense-frontend:main
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 20
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: trust-sense-frontend-svc
  namespace: trust-sense
spec:
  selector:
    app: trust-sense-frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: trust-sense
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trust-sense-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: trust-sense
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: trust-sense-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
