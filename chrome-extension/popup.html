<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRUST SENSE</title>
    <style>
        :root {
            --bg: #060910;
            --surface: #0d1117;
            --card: #111827;
            --border: #1f2937;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --accent3: #10b981;
            --text: #f1f5f9;
            --muted: #64748b;
            --danger: #ef4444;
            --warn: #f59e0b;
            --font: 'Space Mono', monospace;
            --font-display: 'Syne', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 360px;
            height: 100%;
            min-height: 400px;
            font-family: var(--font);
            background: rgba(6, 9, 16, 0.85);
            color: var(--text);
        }

        .container {
            padding: 16px;
        }

        .card {
            background: rgba(13, 17, 23, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.55);
            overflow: hidden;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .header {
            padding: 18px 18px 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
        }

        .header h1 {
            font-family: var(--font-display);
            font-size: 18px;
            letter-spacing: 0.12em;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            margin-top: 4px;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        .loading,
        .error,
        .result {
            padding: 18px;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            text-align: center;
            color: var(--text);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .result {
            display: grid;
            gap: 14px;
        }

        .verdict {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .verdict span:first-child {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .verdict-badge {
            padding: 8px 14px;
            border-radius: 999px;
            font-weight: 700;
            color: white;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .safe {
            background: var(--accent3);
        }

        .caution {
            background: var(--warn);
        }

        .dangerous {
            background: var(--danger);
        }

        .score-box {
            text-align: center;
            padding: 18px 14px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 14px;
        }

        .score-number {
            font-size: 48px;
            font-weight: 800;
            color: var(--accent);
        }

        .score-label {
            font-size: 10px;
            color: var(--muted);
            margin-top: 4px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .metrics {
            display: grid;
            gap: 10px;
            padding: 8px 0;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--muted);
        }

        .metric-name {
            font-weight: 500;
        }

        .metric-value {
            font-weight: 700;
            color: var(--accent);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        button {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.08em;
            transition: transform 0.12s ease, box-shadow 0.12s ease;
        }

        button:active {
            transform: translateY(1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #0b1120;
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.25);
        }

        .btn-primary:hover {
            box-shadow: 0 12px 24px rgba(0, 212, 255, 0.35);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .error {
            background: rgba(255, 69, 58, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 14px;
            padding: 18px;
            color: var(--danger);
            text-align: center;
            font-size: 13px;
        }

        .report {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 14px;
            padding: 14px;
            max-height: 280px;
            overflow: auto;
            font-size: 12px;
            color: var(--text);
            line-height: 1.5;
        }

        .report h3 {
            font-size: 13px;
            margin: 14px 0 8px;
            color: var(--accent);
        }

        .report pre {
            white-space: pre-wrap;
            word-break: break-word;
            background: rgba(255, 255, 255, 0.04);
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin: 10px 0;
            overflow: auto;
        }
         </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                                <div style="display:flex;align-items:center;justify-content:center;gap:16px;">
                                    <img src="codexia.png" alt="Codexia AI Logo" style="height:64px;width:64px;object-fit:cover;border-radius:12px;box-shadow:0 2px 12px #0003;" />
                                    <h1 style="margin:0;font-size:2rem;">Codexia AI</h1>
                                </div>
                                <p>Page credibility analysis</p>
            </div>
            
            <div id="loading" class="loading" style="display: block;">
                <div class="spinner"></div>
                <p style="margin-top: 2px;">Analyzing page...</p>
            </div>
            
            <div id="result" class="result" style="display: none;">
                <div class="verdict">
                    <span>Verdict:</span>
                    <span class="verdict-badge" id="verdict-badge"></span>
                </div>
                
                <div class="score-box">
                    <div class="score-number" id="trust-score">—</div>
                    <div class="score-label">Trust Score</div>
                </div>
                
                <div class="metrics">
                    <div class="metric">
                        <span class="metric-name">Credibility</span>
                        <span class="metric-value" id="m-credibility">—</span>
                    </div>
                    <div class="metric">
                        <span class="metric-name">Sentiment</span>
                        <span class="metric-value" id="m-sentiment">—</span>
                    </div>
                    <div class="metric">
                        <span class="metric-name">Manipulation</span>
                        <span class="metric-value" id="m-manipulation">—</span>
                    </div>
                    <div class="metric">
                        <span class="metric-name">Risk Level</span>
                        <span class="metric-value" id="m-risk">—</span>
                    </div>
                </div>
                
                <div class="button-group">
                    <button class="btn-primary" id="btn-detail">Show Charts</button>
                    <button class="btn-secondary" id="btn-pdf">Save as PDF</button>
                </div>

                <div id="full-report" class="report" style="display: none;">
                    <canvas id="metrics-chart" width="320" height="120" style="margin-bottom:12px;"></canvas>
                    <canvas id="pie-chart" width="320" height="120" style="margin-bottom:12px;"></canvas>
                </div>
                <div id="debug" class="report" style="display: none;"></div>
            </div>
            
            <div id="error" class="error" style="display: none;">
                <p id="error-message">Unable to analyze this page</p>
                <div style="margin-top: 12px; display: flex; gap: 10px; justify-content: center;">
                    <button class="btn-primary" id="btn-retry">Retry</button>
                    <button class="btn-secondary" id="btn-settings">Settings</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="chart.js"></script>
    <script src="jspdf.umd.min.js"></script>
    <script src="popup.js"></script>
</body>
</html>
