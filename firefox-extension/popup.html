<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codexia - Trust Sense Analysis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 400px;
            min-height: 300px;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 300px;
        }

        .header {
            background: linear-gradient(90deg, #00d4ff 0%, #7c3aed 100%);
            padding: 16px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            gap: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #7c3aed;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg) }
        }

        #result {
            display: none;
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }

        .score-display {
            text-align: center;
            margin-bottom: 20px;
        }

        #trust-score {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff 0%, #7c3aed 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .verdict-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
            margin-top: 8px;
        }

        .verdict-badge.safe {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid #10b981;
        }

        .verdict-badge.caution {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
            border: 1px solid #f59e0b;
        }

        .verdict-badge.dangerous {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .metric {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .metric-label {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .metric-value {
            font-size: 20px;
            font-weight: bold;
            color: #00d4ff;
        }

        #error {
            display: none;
            padding: 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            border-radius: 4px;
            margin: 16px;
        }

        #error-message {
            color: #ef4444;
            font-size: 14px;
        }

        .buttons {
            display: flex;
            gap: 8px;
            padding: 16px;
            background: #0f172a;
            border-top: 1px solid #334155;
            justify-content: center;
        }

        button {
            background: linear-gradient(90deg, #00d4ff 0%, #7c3aed 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .summary {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            font-size: 12px;
            line-height: 1.4;
            color: #cbd5e1;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>🔍</div>
            <h1>Codexia</h1>
        </div>

        <div id="loading">
            <div class="spinner"></div>
            <div style="text-align: center;">
                <div style="font-weight: 600;">Analyzing Content</div>
                <div style="font-size: 12px; color: #94a3b8;">Please wait...</div>
            </div>
        </div>

        <div id="result">
            <div class="score-display">
                <div id="trust-score">--</div>
                <div style="font-size: 12px; color: #94a3b8; margin-top: 8px;">Trust Score</div>
                <span id="verdict-badge" class="verdict-badge">ANALYZING</span>
            </div>

            <div class="metrics">
                <div class="metric">
                    <div class="metric-label">Credibility</div>
                    <div class="metric-value" id="m-credibility">--</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Sentiment</div>
                    <div class="metric-value" id="m-sentiment">--</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Manipulation</div>
                    <div class="metric-value" id="m-manipulation">--</div>
                </div>
                <div class="metric">
                    <div class="metric-label">Risk Level</div>
                    <div class="metric-value" id="m-risk">--</div>
                </div>
            </div>

            <div class="summary">
                <strong>Analysis Summary:</strong>
                <div id="summary-text" style="margin-top: 8px;">Gathering data...</div>
            </div>
        </div>

        <div id="error">
            <div id="error-message"></div>
        </div>

        <div class="buttons">
            <button id="btn-retry" style="display: none;">Retry</button>
            <button id="btn-open-full">Open Full Report</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
